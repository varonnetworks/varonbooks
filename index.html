<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정상어학원 교재 관리</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=VT323&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
<style>
:root{
  --bg:#cfd6e2; --bg2:#b8c2d2; --surface:#f2f4f8; --surface2:#e4e9f1; --card:#edf1f7;
  --border:#7b8798; --border-soft:#9aa6b7; --accent:#1f62d0; --accent2:#59b95a;
  --warn:#c9504d; --yellow:#e2b73f; --text:#233142; --muted:#556272;
  --shadow:3px 3px 0 rgba(85,98,114,.18); --inset:inset 0 1px 0 rgba(255,255,255,.85);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:'IBM Plex Sans KR',sans-serif;
  background: linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0)), repeating-linear-gradient(0deg, rgba(109,90,42,.035) 0 1px, transparent 1px 30px), linear-gradient(180deg, var(--bg), var(--bg2));
  color:var(--text); display:flex; flex-direction:column;
}
header{ background:linear-gradient(180deg, #3e84ea, #1f57bb); border-bottom:1px solid #23498e; padding:0 24px; height:66px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
.logo{font-weight:700; font-size:18px; display:flex; align-items:center; gap:10px; color:white;}
.logo-badge{background:linear-gradient(180deg,#f8de82,#d7ae35);color:#4c3900;font-size:12px;font-weight:700;padding:4px 8px;border-radius:6px;border:1px solid #9f7c1c;}
nav{background:#e9e9e3;border-top:1px solid #f8f8f5;border-bottom:1px solid #99a2ad;padding:4px 10px 5px;display:flex;overflow-x:auto;gap:0;}
.tab{min-width:72px;padding:4px 10px 5px;font-size:11px;font-weight:700;color:#344251;cursor:pointer;border-right:1px solid #b8bec7;display:flex;flex-direction:column;align-items:center;gap:3px;flex:0 0 auto;}
.tab.active{background:#dfe6ef;color:#164a9a;box-shadow:inset 0 -1px 0 #aeb9c5;}
main{flex:1;padding:22px;max-width:1240px;margin:0 auto;width:100%}
.page{display:none}.page.active{display:block}
.card{background:linear-gradient(180deg, var(--surface), var(--card));border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow),var(--inset);padding:20px;margin-bottom:16px;position:relative;}
.card-title{font-family:'VT323', monospace;font-size:24px;letter-spacing:1px;color:#2450a6;margin-bottom:12px;}
.retro-strip{background:linear-gradient(180deg,#3f87ef,#245cbf);height:26px;border-radius:6px 6px 0 0;margin:-20px -20px 12px -20px;border-bottom:1px solid #23498e}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.5px}
input, select{background:#ffffff;border:1px solid var(--border-soft);border-radius:4px;padding:10px 12px;font-size:13px;width:100%;}
.btn{padding:10px 16px;border-radius:4px;border:1px solid #7f8c9e;font-size:13px;font-weight:700;cursor:pointer;transition:transform .05s;}
.btn-p{background:linear-gradient(180deg,#4a84ea,#2760c2);color:#fff;}
.btn-s{background:linear-gradient(180deg,#86d389,#4aa656);color:#11361a;}
.btn-d{background:linear-gradient(180deg,#ea8c89,#c8514d);color:#fff;}
.sinput-wrap{position:relative;flex:1;}
.sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);}
.sinput{padding-left:40px!important;font-family:'DM Mono',monospace;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#fff7df;border:2px solid var(--border);border-radius:12px;padding:12px 20px;z-index:999;transition:transform .25s;}
#toast.show{transform:translateX(-50%) translateY(0)}
.twrap{overflow-x:auto;border-radius:6px;border:1px solid var(--border-soft);background:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#dfe6ef;padding:11px 13px;text-align:left;border-bottom:1px solid var(--border-soft)}
td{padding:10px 13px;border-top:1px solid #dde3eb;}
.search-results{display:none;position:absolute;left:0;right:0;top:100%;z-index:1000;background:white;border:1px solid var(--border);max-height:200px;overflow-y:auto;box-shadow:var(--shadow);}
.search-item{padding:10px;cursor:pointer;border-bottom:1px solid #eee;}
.search-item:hover{background:#f0f7ff;}
</style>
</head>
<body>

<header>
  <div class="logo">📚 <span>정상어학원 교재 관리</span> <span class="logo-badge">RETRO</span></div>
</header>

<nav>
  <div class="tab active" onclick="showTab('loan', this)">📖 대여·반납</div>
  <div class="tab" onclick="showTab('sales', this)">🛒 판매 입출고</div>
  <div class="tab" onclick="showTab('bulk', this)">🏫 반별 일괄출고</div>
  <div class="tab" onclick="showTab('unpaid', this)">💰 미납 관리</div>
  <div class="tab" onclick="showTab('stock', this)">📦 재고 현황</div>
  <div class="tab" onclick="showTab('settings', this)">⚙️ 설정</div>
</nav>

<main>
  <!-- 대여 페이지 -->
  <div id="page-loan" class="page active">
    <div class="card">
      <div class="retro-strip"></div>
      <div class="card-title">교재 대여</div>
      <div class="fgrid">
        <div class="fg"><label class="fl">선생님</label><select id="loan-teacher"><option value="">-- 선택 --</option></select></div>
        <div class="fg"><label class="fl">학기</label><input type="text" id="loan-semester" placeholder="26년봄"></div>
      </div>
      <div class="sinput-wrap" style="margin-top:15px">
        <span class="sicon">🔍</span>
        <input class="sinput" id="loan-barcode" placeholder="바코드 스캔 또는 교재명 입력 후 Enter">
      </div>
      <div id="loan-queue-wrap" style="margin-top:10px"></div>
      <button class="btn btn-p" style="margin-top:10px" onclick="processLoanQueue()">대여 처리</button>
    </div>
  </div>

  <!-- 판매 페이지 -->
  <div id="page-sales" class="page">
    <div class="card">
      <div class="retro-strip"></div>
      <div class="card-title">판매 입출고</div>
      <div class="fg" style="position:relative">
        <label class="fl">교재 검색</label>
        <input type="text" id="sales-barcode" placeholder="교재명 또는 바코드 입력" autocomplete="off">
        <div id="sales-results" class="search-results"></div>
      </div>
      <div id="sales-book-preview" style="margin-top:10px; padding:10px; background:#fff8e8; display:none; border-radius:8px; border:1px solid #e0c8a0;">
        <strong>선택된 교재:</strong> <span id="sales-preview-name"></span>
      </div>
      <div class="fgrid" style="margin-top:15px">
        <div class="fg"><label class="fl">유형</label><select id="sales-type"><option value="출고">출고 (판매)</option><option value="입고">입고</option></select></div>
        <div class="fg"><label class="fl">수량</label><input type="number" id="sales-qty" value="1"></div>
        <div class="fg"><label class="fl">학생이름</label><input type="text" id="sales-student-name"></div>
      </div>
      <button class="btn btn-p" style="margin-top:15px" onclick="doSales()">처리하기</button>
    </div>
  </div>

  <!-- 일괄출고 페이지 -->
  <div id="page-bulk" class="page">
    <div class="card">
      <div class="retro-strip"></div>
      <div class="card-title">반별 일괄 출고</div>
      <div class="fg" style="position:relative">
        <label class="fl">교재 검색</label>
        <input type="text" id="bulk-barcode" placeholder="교재명 검색" autocomplete="off">
        <div id="bulk-results" class="search-results"></div>
      </div>
      <div class="fgrid" style="margin-top:15px">
        <div class="fg"><label class="fl">학기</label><select id="bulk-semester" onchange="updateBulkClasses()"></select></div>
        <div class="fg"><label class="fl">반 선택</label><select id="bulk-class"></select></div>
      </div>
      <button class="btn btn-p" style="margin-top:15px" onclick="doBulk()">일괄 출고 실행</button>
    </div>
  </div>

  <!-- 재고 현황 -->
  <div id="page-stock" class="page">
    <div class="card">
      <div class="retro-strip"></div>
      <div class="card-title">실시간 재고 현황</div>
      <div id="stock-list"></div>
    </div>
  </div>

  <!-- 설정 페이지 -->
  <div id="page-settings" class="page">
    <div class="card">
      <div class="retro-strip"></div>
      <div class="card-title">시스템 관리</div>
      <button class="btn btn-d" onclick="doInit()">시트 초기화(최초1회)</button>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwDjKsqwVOqtpmbptlowSWffQHqfgqhOLSMZ4si_Pttc4MFku9JNZKrenSHW2k3xn-4/exec';
var books = [], teachers = [], semesters = [];

async function call(action, payload) {
  try {
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action, payload: payload || {} })
    });
    return await response.json();
  } catch (e) {
    toast('서버 연결 오류', false);
    return { ok: false };
  }
}

function toast(msg, isOk = true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.border = isOk ? '2px solid green' : '2px solid red';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function showTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-' + id).classList.add('active');
  if(id === 'stock') loadStock();
}

// 교재 검색 기능 (핵심 수정 사항)
function initSearch(inputId, resultsId, previewId, nameId) {
  const input = document.getElementById(inputId);
  const results = document.getElementById(resultsId);
  const preview = document.getElementById(previewId);
  const nameSpan = document.getElementById(nameId);

  input.addEventListener('input', () => {
    const val = input.value.toLowerCase();
    if (!val) { results.style.display = 'none'; return; }
    
    const filtered = books.filter(b => 
      (b['교재명'] && b['교재명'].toLowerCase().includes(val)) || 
      (b['바코드'] && String(b['바코드']).includes(val))
    ).slice(0, 10);

    if (filtered.length > 0) {
      results.innerHTML = filtered.map(b => `
        <div class="search-item" onclick="selectBook('${inputId}', '${resultsId}', '${previewId}', '${nameId}', '${b['교재명']}', '${b['바코드']}')">
          <strong>${b['교재명']}</strong><br><small>${b['바코드']}</small>
        </div>
      `).join('');
      results.style.display = 'block';
    } else {
      results.style.display = 'none';
    }
  });
}

function selectBook(inputId, resultsId, previewId, nameId, name, barcode) {
  const input = document.getElementById(inputId);
  input.value = name;
  input.dataset.barcode = barcode; // 실제 바코드 값 저장
  document.getElementById(resultsId).style.display = 'none';
  
  if (previewId) {
    document.getElementById(previewId).style.display = 'block';
    document.getElementById(nameId).textContent = name + " (" + barcode + ")";
  }
}

async function loadInitialData() {
  const rBooks = await call('getBooks');
  const rTeachers = await call('getTeachers');
  const rSems = await call('getSemesters');
  
  books = rBooks.data || [];
  teachers = rTeachers.data || [];
  semesters = rSems.data || [];

  // 선생님 셀렉트박스 채우기
  document.getElementById('loan-teacher').innerHTML = '<option value="">-- 선택 --</option>' + 
    teachers.map(t => `<option value="${t['교사ID']}">${t['이름']}</option>`).join('');

  // 학기 셀렉트박스
  const semHtml = semesters.map(s => `<option value="${s}">${s}</option>`).join('');
  if(document.getElementById('bulk-semester')) document.getElementById('bulk-semester').innerHTML = semHtml;

  // 검색 초기화
  initSearch('sales-barcode', 'sales-results', 'sales-book-preview', 'sales-preview-name');
  initSearch('bulk-barcode', 'bulk-results', '', '');
}

async function loadStock() {
  const res = await call('getStockStatus');
  const data = res.data || [];
  const html = `
    <div class="twrap">
      <table>
        <thead><tr><th>교재명</th><th>재고</th><th>대여중</th></tr></thead>
        <tbody>
          ${data.map(r => `<tr><td>${r['교재명']}</td><td>${r['현재재고']}</td><td>${r['대여중']}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  document.getElementById('stock-list').innerHTML = html;
}

async function doSales() {
  const barcode = document.getElementById('sales-barcode').dataset.barcode;
  const qty = document.getElementById('sales-qty').value;
  const type = document.getElementById('sales-type').value;
  const student = document.getElementById('sales-student-name').value;

  if(!barcode) { toast('교재를 선택해주세요', false); return; }
  
  const res = await call('addSales', { barcode, qty, type, studentId: student, payStatus: '완납' });
  toast(res.msg, res.ok);
}

// 초기화 실행
window.onload = loadInitialData;
</script>
</body>
</html>
