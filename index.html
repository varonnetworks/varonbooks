<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정상어학원 교재 관리 시스템</title>
    <!-- 라이브러리 통합: 하나만 사용해야 충돌이 없습니다 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117; --surface: #1a1d27; --card: #22263a;
            --border: #2e3350; --accent: #4f7aff; --accent2: #00d4aa;
            --text: #e8eaf6; --muted: #7b82a8;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 0; overflow-x: hidden;
        }

        header {
            background: var(--surface); padding: 15px 20px;
            border-bottom: 1px solid var(--border); text-align: center;
        }

        main { padding: 20px; max-width: 600px; margin: 0 auto; }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 15px;
        }

        .label { font-size: 13px; color: var(--accent2); margin-bottom: 8px; font-weight: bold; }

        .scan-row { display: flex; gap: 10px; }

        input {
            background: var(--bg); border: 1px solid var(--border);
            color: #fff; padding: 12px; border-radius: 8px; flex: 1; font-size: 16px;
        }

        .btn-cam {
            background: var(--accent2); color: #000; border: none;
            padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* 카메라 모달 */
        #cam-modal {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }

        #reader { width: 100%; max-width: 500px; height: auto; }

        .controls {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; gap: 20px;
        }

        .btn-close {
            background: #ff6b6b; color: white; border: none;
            padding: 15px 40px; border-radius: 30px; font-size: 16px; font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.2rem; font-weight: 900; letter-spacing: -0.5px;">📚 정상어학원 교재관리</div>
</header>

<main>
    <div class="card">
        <div class="label">📖 교재 대여</div>
        <div class="scan-row">
            <input id="loan-barcode" type="text" placeholder="바코드를 스캔하세요">
            <button class="btn-cam" onclick="startScanning('loan-barcode')">스캔</button>
        </div>
    </div>

    <div class="card">
        <div class="label">↩️ 교재 반납</div>
        <div class="scan-row">
            <input id="return-barcode" type="text" placeholder="바코드를 스캔하세요">
            <button class="btn-cam" onclick="startScanning('return-barcode')">스캔</button>
        </div>
    </div>
</main>

<div id="cam-modal">
    <div id="reader"></div>
    <div class="controls">
        <button class="btn-close" onclick="stopScanning()">닫기</button>
    </div>
</div>

<script>
    let html5QrCode;

    async function startScanning(targetId) {
        const modal = document.getElementById('cam-modal');
        modal.style.display = 'flex';

        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
        }

        const config = { 
            fps: 20, 
            qrbox: { width: 280, height: 180 }, // 갤럭시 화면 크기에 적합한 가이드 박스
            aspectRatio: 1.333334 
        };

        try {
            // 안드로이드/갤럭시 후면 카메라 강제 타겟팅
            await html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    document.getElementById(targetId).value = decodedText;
                    // 갤럭시 진동 피드백 (선택 사항)
                    if (navigator.vibrate) navigator.vibrate(100);
                    stopScanning();
                },
                (errorMessage) => { /* 스캔 시도 중... */ }
            );
        } catch (err) {
            console.error("카메라 에러:", err);
            alert("카메라를 켤 수 없습니다. HTTPS 연결 및 카메라 권한을 확인해주세요.");
            stopScanning();
        }
    }

    function stopScanning() {
        const modal = document.getElementById('cam-modal');
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                modal.style.display = 'none';
            }).catch(err => console.error(err));
        } else {
            modal.style.display = 'none';
        }
    }
</script>

</body>
</html>
