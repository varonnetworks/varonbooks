<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>도서 및 비품 통합 관리 시스템</title>
    <!-- 외부 라이브러리: QR/바코드 스캔 및 엑셀 출력 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --accent1: #0ea5e9;
            --accent2: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.5; }

        /* 레이아웃 */
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 0; }

        /* 탭 메뉴 */
        .tabs { display: flex; background: #e2e8f0; padding: 4px; border-radius: 12px; margin-bottom: 25px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px 10px; border: none; background: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: var(--text-light); transition: 0.2s; white-space: nowrap; }
        .tab-btn.active { background: var(--surface); color: var(--primary); shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

        /* 카드 및 폼 */
        .card { background: var(--surface); border-radius: 16px; padding: 24px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text-light); }
        .input-group { display: flex; gap: 8px; }
        input, select { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--primary); }

        /* 버튼 */
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-p { background: var(--primary); color: white; width: 100%; }
        .btn-p:hover { background: var(--primary-hover); }
        .btn-s { background: var(--accent1); color: white; }
        .btn-g { background: #f1f5f9; color: var(--text); }
        .btn-d { background: var(--danger); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }

        /* 테이블 */
        .table-wrapper { overflow-x: auto; margin-top: 10px; border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 600px; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-light); border-bottom: 1px solid var(--border); }
        td { padding: 12px; font-size: 14px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }

        /* 카메라 모달 스타일 */
        #cam-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; }
        #cam-modal.open { display:flex; }
        #cam-box { background:var(--surface); width:min(450px, 95vw); border-radius:20px; overflow:hidden; position:relative; }
        #cam-header { padding:16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
        #cam-reader { width:100%; aspect-ratio:4/3; background:#000; position:relative; }
        #cam-footer { padding:16px; display:flex; gap:10px; }
        #cam-status { text-align:center; padding:12px; font-size:14px; color:var(--accent2); font-weight:bold; }
        
        /* 스캔 가이드 라인 */
        .scan-guide { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:70%; height:40%; border:2px solid var(--accent2); border-radius:8px; box-shadow:0 0 0 4000px rgba(0,0,0,0.5); pointer-events:none; z-index:10; }
        .scan-line { position:absolute; top:0; left:0; width:100%; height:2px; background:var(--accent2); box-shadow:0 0 8px var(--accent2); animation: scanMove 2s infinite linear; }
        @keyframes scanMove { 0% { top:0; } 100% { top:100%; } }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        /* 검색바 */
        .search-bar { display: flex; gap: 8px; margin-bottom: 15px; }

        /* 배지 */
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .badge-in { background: #dcfce7; color: #166534; }
        .badge-out { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📚 ASSET MANAGER</h1>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="showTab('loan-tab')">대여/반납</button>
        <button class="tab-btn" onclick="showTab('list-tab')">현황 목록</button>
        <button class="tab-btn" onclick="showTab('reg-tab')">물품 등록</button>
        <button class="tab-btn" onclick="showTab('history-tab')">로그</button>
    </nav>

    <!-- 1. 대여/반납 탭 -->
    <div id="loan-tab" class="tab-content active">
        <div class="card">
            <h3>📤 대여하기 (연속 스캔 지원)</h3>
            <div class="form-group">
                <label>대여자 성함</label>
                <input type="text" id="loan-user" placeholder="이름을 입력하세요">
            </div>
            <div class="form-group">
                <label>물품 바코드</label>
                <div class="input-group">
                    <input type="text" id="loan-barcode" placeholder="바코드를 스캔하거나 입력">
                    <button class="btn btn-s" onclick="openCam('loan-barcode')">📷 스캔</button>
                </div>
            </div>
            <button class="btn btn-p" onclick="doLoan()">대여 처리</button>
        </div>

        <div class="card">
            <h3>📥 반납하기</h3>
            <div class="form-group">
                <label>물품 바코드</label>
                <div class="input-group">
                    <input type="text" id="return-barcode" placeholder="반납할 물품 스캔">
                    <button class="btn btn-s" onclick="openCam('return-barcode')">📷 스캔</button>
                </div>
            </div>
            <button class="btn btn-p" style="background:var(--accent2)" onclick="doReturn()">반납 처리</button>
        </div>
    </div>

    <!-- 2. 목록 탭 -->
    <div id="list-tab" class="tab-content">
        <div class="card">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="물품명 또는 바코드 검색..." onkeyup="renderList()">
                <button class="btn btn-g" onclick="exportToExcel()">📊 엑셀 저장</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>바코드</th>
                            <th>카테고리</th>
                            <th>물품명</th>
                            <th>상태</th>
                            <th>현재 사용자</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 3. 등록 탭 -->
    <div id="reg-tab" class="tab-content">
        <div class="card">
            <h3>🆕 신규 물품 등록</h3>
            <div class="form-group">
                <label>바코드 번호</label>
                <div class="input-group">
                    <input type="text" id="reg-barcode" placeholder="바코드 직접 입력 또는 스캔">
                    <button class="btn btn-s" onclick="openCam('reg-barcode')">📷 스캔</button>
                </div>
            </div>
            <div class="form-group">
                <label>카테고리</label>
                <select id="reg-category">
                    <option value="도서">📖 도서</option>
                    <option value="전자기기">💻 전자기기</option>
                    <option value="사무용품">✂️ 사무용품</option>
                    <option value="기타">🎸 기타</option>
                </select>
            </div>
            <div class="form-group">
                <label>물품명</label>
                <input type="text" id="reg-name" placeholder="물품 이름을 입력하세요">
            </div>
            <button class="btn btn-p" onclick="registerItem()">등록하기</button>
        </div>
    </div>

    <!-- 4. 로그 탭 -->
    <div id="history-tab" class="tab-content">
        <div class="card">
            <h3>🕒 이용 기록</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>일시</th>
                            <th>작업</th>
                            <th>물품명</th>
                            <th>사용자</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 통합 카메라 모달 -->
<div id="cam-modal">
  <div id="cam-box">
    <div id="cam-header">
      <div style="font-weight:700;">카메라 스캔</div>
      <button class="btn btn-g btn-sm" onclick="closeCam()">✕</button>
    </div>
    <div id="cam-reader">
        <div class="scan-guide"><div class="scan-line"></div></div>
    </div>
    <div id="cam-status">준비 중...</div>
    <div id="cam-footer">
      <button class="btn btn-g" style="flex:1" onclick="switchCam()">🔄 전환</button>
      <button class="btn btn-d" style="flex:1" onclick="closeCam()">닫기</button>
    </div>
  </div>
</div>

<script>
    // 데이터 저장소 (LocalStorage 활용)
    let items = JSON.parse(localStorage.getItem('assets_items')) || [];
    let logs = JSON.parse(localStorage.getItem('assets_logs')) || [];

    function saveData() {
        localStorage.setItem('assets_items', JSON.stringify(items));
        localStorage.setItem('assets_logs', JSON.stringify(logs));
        renderList();
        renderLogs();
    }

    // 탭 전환
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // 물품 등록
    function registerItem() {
        const barcode = document.getElementById('reg-barcode').value.trim();
        const name = document.getElementById('reg-name').value.trim();
        const category = document.getElementById('reg-category').value;

        if (!barcode || !name) return alert('모든 필드를 입력해주세요.');
        if (items.find(i => i.barcode === barcode)) return alert('이미 등록된 바코드입니다.');

        items.push({ barcode, name, category, status: '대여가능', user: '-' });
        addLog('등록', name, '-');
        saveData();
        
        document.getElementById('reg-barcode').value = '';
        document.getElementById('reg-name').value = '';
        alert('등록되었습니다.');
    }

    // 대여 처리
    function doLoan() {
        const user = document.getElementById('loan-user').value.trim();
        const barcode = document.getElementById('loan-barcode').value.trim();

        if (!user || !barcode) return alert('사용자와 바코드를 모두 입력/스캔하세요.');

        const item = items.find(i => i.barcode === barcode);
        if (!item) return alert('등록되지 않은 물품입니다.');
        if (item.status === '대출중') return alert('이미 대출 중인 물품입니다.');

        item.status = '대출중';
        item.user = user;
        addLog('대여', item.name, user);
        saveData();

        document.getElementById('loan-barcode').value = '';
        // 대여 탭에서는 사용자 이름은 남겨두고 바코드만 비워 연속 스캔 유도
    }

    // 반납 처리
    function doReturn() {
        const barcode = document.getElementById('return-barcode').value.trim();
        const item = items.find(i => i.barcode === barcode);

        if (!item) return alert('물품을 찾을 수 없습니다.');
        if (item.status === '대여가능') return alert('이미 반납된 물품입니다.');

        const prevUser = item.user;
        item.status = '대여가능';
        item.user = '-';
        addLog('반납', item.name, prevUser);
        saveData();

        document.getElementById('return-barcode').value = '';
        alert('반납 완료되었습니다.');
    }

    // 로그 기록
    function addLog(type, itemName, user) {
        const now = new Date().toLocaleString();
        logs.unshift({ time: now, type, itemName, user });
    }

    // 리스트 렌더링
    function renderList() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const body = document.getElementById('list-body');
        body.innerHTML = '';

        items.filter(i => i.name.toLowerCase().includes(query) || i.barcode.includes(query))
             .forEach((item, index) => {
            const row = `<tr>
                <td><code>${item.barcode}</code></td>
                <td>${item.category}</td>
                <td><b>${item.name}</b></td>
                <td><span class="badge ${item.status === '대여가능' ? 'badge-in' : 'badge-out'}">${item.status}</span></td>
                <td>${item.user}</td>
                <td><button class="btn btn-g btn-sm" onclick="deleteItem(${index})" style="color:red">삭제</button></td>
            </tr>`;
            body.innerHTML += row;
        });
    }

    function renderLogs() {
        const body = document.getElementById('history-body');
        body.innerHTML = logs.map(l => `<tr>
            <td style="font-size:12px; color:gray">${l.time}</td>
            <td><b>${l.type}</b></td>
            <td>${l.itemName}</td>
            <td>${l.user}</td>
        </tr>`).join('');
    }

    function deleteItem(index) {
        if (confirm('정말 삭제하시겠습니까?')) {
            items.splice(index, 1);
            saveData();
        }
    }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(items);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Assets");
        XLSX.writeFile(wb, "Asset_Export.xlsx");
    }

    // ─── 카메라 스캐너 시스템 ──────────────────────────────────────────
    let html5QrCode = null;
    let camTargetId = null;
    let isScannerRunning = false;

    async function openCam(inputId) {
        camTargetId = inputId;
        document.getElementById('cam-modal').classList.add('open');
        document.getElementById('cam-status').textContent = "카메라를 시작하는 중...";

        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("cam-reader");
        }
        
        startScanner();
    }

    function startScanner() {
        const config = { 
            fps: 15, 
            qrbox: { width: 250, height: 150 },
            aspectRatio: 1.333334
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            (decodedText) => {
                // 성공 시 처리
                if (navigator.vibrate) navigator.vibrate(50);
                document.getElementById(camTargetId).value = decodedText;
                document.getElementById('cam-status').innerHTML = "✅ 인식됨: " + decodedText;

                // 연속 스캔을 위한 처리: 대여탭이면 즉시 대여 실행 후 대기
                if (camTargetId === 'loan-barcode') {
                    doLoan();
                } else if (camTargetId === 'return-barcode') {
                    doReturn();
                    closeCam();
                } else {
                    setTimeout(closeCam, 800);
                }
            },
            (error) => { /* 인식 실패 시 에러 무시 */ }
        ).then(() => {
            isScannerRunning = true;
            document.getElementById('cam-status').textContent = "바코드를 사각형 안에 맞춰주세요.";
        }).catch(err => {
            document.getElementById('cam-status').textContent = "카메라 에러: " + err;
        });
    }

    async function switchCam() {
        if (html5QrCode && isScannerRunning) {
            await html5QrCode.stop();
            const newMode = html5QrCode._currentFacingMode === "environment" ? "user" : "environment";
            html5QrCode.start({ facingMode: newMode }, { fps:15, qrbox:{width:250, height:150} }, (text) => {
                 document.getElementById(camTargetId).value = text;
                 closeCam();
            });
        }
    }

    async function closeCam() {
        if (html5QrCode && isScannerRunning) {
            await html5QrCode.stop();
            isScannerRunning = false;
        }
        document.getElementById('cam-modal').classList.remove('open');
    }

    // 초기 실행
    window.onload = () => {
        renderList();
        renderLogs();
    };
</script>

</body>
</html>
